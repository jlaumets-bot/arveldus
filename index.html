<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arved — Lihtne arveldus</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;color:#1e293b;background:#f8fafc;font-size:14px;line-height:1.4}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px rgba(59,130,246,.4)}
  table{border-collapse:collapse;width:100%}
  a{color:#2563eb;text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:230px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
  .brand{padding:18px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
  .brand-logo{width:32px;height:32px;border-radius:8px;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .brand-name{font-weight:600;color:#0f172a;font-size:15px}
  .nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:2px}
  .nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;font-weight:500;color:#334155;text-align:left;width:100%;transition:background .1s}
  .nav-btn:hover{background:#f1f5f9}
  .nav-btn.active{background:#eff6ff;color:#1d4ed8}
  .nav-btn .ico{width:18px;text-align:center}
  .sidebar-foot{padding:12px;border-top:1px solid #e2e8f0}
  .main{flex:1;overflow-y:auto;padding:32px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;transition:background .1s,border-color .1s}
  .btn-primary{background:#2563eb;color:#fff}
  .btn-primary:hover{background:#1d4ed8}
  .btn-secondary{background:#fff;border:1px solid #cbd5e1;color:#334155}
  .btn-secondary:hover{background:#f8fafc}
  .btn-danger-link{color:#dc2626;font-size:12px;background:none;padding:0}
  .btn-danger-link:hover{text-decoration:underline}
  .link{color:#2563eb;font-size:12px;background:none;padding:0}
  .link:hover{text-decoration:underline}
  .link-emerald{color:#059669}
  .link-slate{color:#334155}
  .full{width:100%}

  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .page-title{font-size:24px;font-weight:700;color:#0f172a;margin:0}
  .page-sub{font-size:13px;color:#64748b;margin-top:4px}

  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px}
  .card-head{padding:18px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .card-title{font-weight:600;color:#0f172a;font-size:15px;margin:0}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px}
  .stat{background:#fff;padding:18px;border-radius:12px;border:1px solid #e2e8f0}
  .stat-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
  .stat-value{font-size:24px;font-weight:700;margin-top:8px}
  .stat-sub{font-size:11px;color:#94a3b8;margin-top:4px}
  .c-blue{color:#2563eb}.c-emerald{color:#059669}.c-rose{color:#e11d48}.c-slate{color:#334155}

  .tbl{font-size:14px}
  .tbl thead{background:#f8fafc}
  .tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#64748b}
  .tbl th.right,.tbl td.right{text-align:right}
  .tbl td{padding:12px 14px;border-top:1px solid #f1f5f9}
  .tbl tbody tr:hover{background:#f8fafc}
  .tbl .actions{white-space:nowrap;text-align:right}
  .tbl .actions button{margin-left:8px}

  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.04em}
  .b-paid{background:#d1fae5;color:#047857}
  .b-unpaid{background:#dbeafe;color:#1d4ed8}
  .b-overdue{background:#ffe4e6;color:#be123c}
  .b-draft{background:#f1f5f9;color:#475569}

  .empty{padding:56px 24px;text-align:center;color:#64748b}
  .empty-ico{font-size:36px;margin-bottom:10px}
  .empty-title{font-weight:600;color:#334155;margin-bottom:4px}
  .empty-sub{font-size:13px;margin-bottom:14px}

  .field{margin-bottom:14px}
  .field-label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:5px;text-transform:uppercase;letter-spacing:.02em}
  .input,select.input,textarea.input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:8px 10px;font-size:14px;background:#fff}
  textarea.input{resize:vertical}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}

  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:820px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
  .modal-small{max-width:440px}
  .modal-head{position:sticky;top:0;background:#fff;padding:18px 22px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .modal-title{font-size:18px;font-weight:700;margin:0}
  .modal-close{font-size:24px;line-height:1;color:#94a3b8;padding:0 6px}
  .modal-close:hover{color:#475569}
  .modal-body{padding:22px}
  .hidden{display:none !important}

  .items{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:18px}
  .items table{width:100%}
  .items thead{background:#f8fafc}
  .items th{padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;color:#64748b;text-align:left}
  .items th.right{text-align:right}
  .items td{padding:6px 10px;border-top:1px solid #f1f5f9;vertical-align:middle}
  .items input{width:100%;border:none;background:transparent;font-size:14px;padding:4px 0}
  .items .item-num{text-align:right}
  .items .line-total{font-weight:600;text-align:right}
  .items .rm{color:#94a3b8;font-size:18px;line-height:1}
  .items .rm:hover{color:#dc2626}

  .totals{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;margin-bottom:18px}
  @media(max-width:640px){.totals{grid-template-columns:1fr}}
  .totals-list{display:flex;flex-direction:column;gap:8px;font-size:14px}
  .t-row{display:flex;align-items:center;justify-content:space-between}
  .t-row .lbl{color:#64748b}
  .t-row input{width:80px;border:1px solid #cbd5e1;border-radius:6px;padding:4px 6px;text-align:right;font-size:13px}
  .t-row select{border:1px solid #cbd5e1;border-radius:6px;padding:4px;font-size:13px}
  .t-total{border-top:1px solid #e2e8f0;padding-top:10px;font-size:18px;font-weight:700}

  .rec-box{margin-top:14px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
  .rec-box label{display:flex;align-items:center;gap:8px;font-weight:500}
  .rec-row{margin-top:8px;display:flex;align-items:center;gap:8px}

  .editor-foot{display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid #e2e8f0}
  .editor-foot .right{display:flex;gap:8px}

  .logo-wrap{display:flex;align-items:center;gap:18px}
  .logo-box{width:96px;height:96px;border-radius:10px;border:2px dashed #cbd5e1;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .logo-box img{max-width:100%;max-height:100%;object-fit:contain}
  .logo-box .ph{font-size:11px;color:#94a3b8}

  .toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.2);z-index:60}

  #print-area{display:none}
  @media print{
    body *{visibility:hidden}
    #print-area, #print-area *{visibility:visible}
    #print-area{display:block;position:absolute;left:0;top:0;width:100%;padding:40px;font-size:12px;color:#000}
    .pa-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px}
    .pa-biz{display:flex;gap:16px;align-items:flex-start}
    .pa-logo{width:64px;height:64px;object-fit:contain}
    .pa-biz-name{font-size:16px;font-weight:700;margin-bottom:6px}
    .pa-biz-info{font-size:11px;color:#444;line-height:1.5;white-space:pre-line}
    .pa-title{font-size:32px;font-weight:700;letter-spacing:.04em;color:#222;text-align:right}
    .pa-number{font-size:11px;color:#666;text-align:right;margin-top:4px}
    .pa-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .pa-label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .pa-client{font-size:12px;line-height:1.5;white-space:pre-line}
    .pa-dates{text-align:right;font-size:12px;line-height:1.7}
    .pa-dates strong{display:inline-block;width:90px;text-align:left}
    .pa-items{width:100%;border-collapse:collapse;margin-bottom:18px}
    .pa-items th{background:#f3f4f6;text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;color:#444;border-bottom:1px solid #ddd}
    .pa-items th.r,.pa-items td.r{text-align:right}
    .pa-items td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
    .pa-totals{margin-left:auto;width:280px;font-size:12px}
    .pa-totals .tr{display:flex;justify-content:space-between;padding:4px 0}
    .pa-totals .tr.tot{border-top:1px solid #333;margin-top:6px;padding-top:8px;font-size:14px;font-weight:700}
    .pa-notes{margin-top:30px;padding-top:14px;border-top:1px solid #eee}
    .pa-notes-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:4px}
    .pa-notes-text{font-size:11px;color:#444;white-space:pre-line}
    @page{margin:0}
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">€</div>
      <div class="brand-name">Arveldus</div>
    </div>
    <nav class="nav">
      <button data-view="dashboard" class="nav-btn"><span class="ico">📊</span>Töölaud</button>
      <button data-view="invoices" class="nav-btn"><span class="ico">📄</span>Arved</button>
      <button data-view="clients" class="nav-btn"><span class="ico">👥</span>Kliendid</button>
      <button data-view="settings" class="nav-btn"><span class="ico">⚙️</span>Seaded</button>
    </nav>
    <div class="sidebar-foot">
      <button onclick="openInvoiceEditor()" class="btn btn-primary full">+ Uus arve</button>
    </div>
  </aside>

  <main class="main">
    <div id="view-dashboard" class="view"></div>
    <div id="view-invoices" class="view hidden"></div>
    <div id="view-clients" class="view hidden"></div>
    <div id="view-settings" class="view hidden"></div>
  </main>
</div>

<div id="invoiceModal" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="invoiceModalTitle" class="modal-title">Uus arve</h2>
      <button onclick="closeInvoiceEditor()" class="modal-close">×</button>
    </div>
    <div id="invoiceEditorBody" class="modal-body"></div>
  </div>
</div>

<div id="clientModal" class="modal-bg hidden">
  <div class="modal modal-small">
    <div class="modal-head">
      <h2 id="clientModalTitle" class="modal-title">Uus klient</h2>
      <button onclick="closeClientModal()" class="modal-close">×</button>
    </div>
    <div id="clientModalBody" class="modal-body"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="print-area"></div>

<script>
const DB_KEY='lihtne_arveldus_v1';
const defaultState={
  business:{name:'Sinu ettevõte',email:'',address:'',phone:'',logo:'',currencySymbol:'€',defaultTaxRate:22,invoicePrefix:'ARVE-',nextNumber:1001,notes:'Täname koostöö eest!'},
  clients:[],invoices:[]
};
let state=load();
let editingInvoiceId=null,editingClientId=null;

const STATUS_LABEL={paid:'TASUTUD',unpaid:'TASUMATA',overdue:'TÄHTAEG ÜLETATUD',draft:'MUSTAND'};
const STATUS_OPTIONS=[['draft','Mustand'],['sent','Saadetud'],['paid','Tasutud']];
const INTERVAL_LABEL={weekly:'Iganädalaselt',monthly:'Igakuiselt',quarterly:'Kvartaalselt',yearly:'Iga-aastaselt'};

function load(){
  try{const r=localStorage.getItem(DB_KEY);if(!r)return JSON.parse(JSON.stringify(defaultState));
    const s=JSON.parse(r);return {...defaultState,...s,business:{...defaultState.business,...s.business}};
  }catch{return JSON.parse(JSON.stringify(defaultState));}
}
function save(){localStorage.setItem(DB_KEY,JSON.stringify(state))}
function uid(){return Math.random().toString(36).slice(2,10)}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function fmt(n){return (Number(n)||0).toFixed(2).replace('.',',')+' '+state.business.currencySymbol}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2000)}

function invoiceStatus(inv){
  if(inv.status==='paid')return 'paid';
  if(inv.status==='draft')return 'draft';
  if(inv.dueDate && inv.dueDate<today())return 'overdue';
  return 'unpaid';
}
function badge(s){return `<span class="badge b-${s}">${STATUS_LABEL[s]}</span>`}
function totals(inv){
  const sub=(inv.items||[]).reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.price)||0),0);
  const dAmt=inv.discountType==='percent'?sub*(Number(inv.discount)||0)/100:(Number(inv.discount)||0);
  const taxable=Math.max(0,sub-dAmt);
  const tAmt=taxable*(Number(inv.taxRate)||0)/100;
  return {subtotal:sub,discountAmt:dAmt,taxAmt:tAmt,total:taxable+tAmt};
}

document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchView(b.dataset.view)));
function switchView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.add('hidden'));
  document.getElementById('view-'+v).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  ({dashboard:renderDashboard,invoices:renderInvoices,clients:renderClients,settings:renderSettings})[v]();
}

function renderDashboard(){
  const invs=state.invoices;
  let out=0,paid=0,over=0,drafts=0;
  const mStart=today().slice(0,7);
  invs.forEach(i=>{
    const t=totals(i).total,s=invoiceStatus(i);
    if(s==='unpaid'||s==='overdue')out+=t;
    if(s==='overdue')over+=t;
    if(s==='draft')drafts++;
    if(s==='paid'&&(i.paidDate||'').startsWith(mStart))paid+=t;
  });
  const recent=[...invs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);
  document.getElementById('view-dashboard').innerHTML=`
    <div class="page-head">
      <div><h1 class="page-title">Töölaud</h1><div class="page-sub">Ülevaade sinu arveldustegevusest</div></div>
      <button onclick="openInvoiceEditor()" class="btn btn-primary">+ Uus arve</button>
    </div>
    <div class="stat-grid">
      ${stat('Tasumata',fmt(out),'c-blue','Klientidelt saada')}
      ${stat('Tasutud sel kuul',fmt(paid),'c-emerald','Tulu sel kuul')}
      ${stat('Tähtaeg ületatud',fmt(over),'c-rose','Üle maksetähtaja')}
      ${stat('Mustandid',String(drafts),'c-slate','Veel saatmata')}
    </div>
    <div class="card">
      <div class="card-head">
        <h2 class="card-title">Hiljutised arved</h2>
        <button onclick="switchView('invoices')" class="link">Vaata kõiki →</button>
      </div>
      ${recent.length===0?emptyInvoices():invoiceTable(recent)}
    </div>`;
}
function stat(l,v,c,s){return `<div class="stat"><div class="stat-label">${l}</div><div class="stat-value ${c}">${v}</div><div class="stat-sub">${s}</div></div>`}
function emptyInvoices(){return `<div class="empty">
  <div class="empty-ico">📄</div>
  <div class="empty-title">Pole veel arveid</div>
  <div class="empty-sub">Loo oma esimene arve, et alustada.</div>
  <button onclick="openInvoiceEditor()" class="btn btn-primary">+ Uus arve</button>
</div>`}

function renderInvoices(){
  const invs=[...state.invoices].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('view-invoices').innerHTML=`
    <div class="page-head">
      <div><h1 class="page-title">Arved</h1><div class="page-sub">${invs.length} kokku</div></div>
      <button onclick="openInvoiceEditor()" class="btn btn-primary">+ Uus arve</button>
    </div>
    <div class="card">${invs.length===0?emptyInvoices():invoiceTable(invs)}</div>`;
}
function invoiceTable(invs){
  return `<table class="tbl"><thead><tr>
    <th>Number</th><th>Klient</th><th>Kuupäev</th><th>Tähtaeg</th>
    <th class="right">Summa</th><th>Olek</th><th class="right">Tegevused</th>
  </tr></thead><tbody>${invs.map(inv=>{
    const c=state.clients.find(x=>x.id===inv.clientId);
    const t=totals(inv).total,s=invoiceStatus(inv);
    return `<tr>
      <td><strong>${esc(inv.number)}</strong>${inv.recurring?' <span title="Korduv" style="color:#2563eb">↻</span>':''}</td>
      <td>${c?esc(c.name):'<span style="color:#94a3b8">Klient puudub</span>'}</td>
      <td style="color:#475569">${esc(inv.date||'-')}</td>
      <td style="color:#475569">${esc(inv.dueDate||'-')}</td>
      <td class="right" style="font-weight:600">${fmt(t)}</td>
      <td>${badge(s)}</td>
      <td class="actions">
        <button onclick="openInvoiceEditor('${inv.id}')" class="link">Muuda</button>
        <button onclick="printInvoice('${inv.id}')" class="link link-slate">PDF</button>
        ${s!=='paid'?`<button onclick="markPaid('${inv.id}')" class="link link-emerald">Märgi tasutuks</button>`:''}
        <button onclick="deleteInvoice('${inv.id}')" class="btn-danger-link">Kustuta</button>
      </td>
    </tr>`;
  }).join('')}</tbody></table>`;
}
function markPaid(id){const i=state.invoices.find(x=>x.id===id);i.status='paid';i.paidDate=today();save();renderInvoices();toast('Märgitud tasutuks')}
function deleteInvoice(id){if(!confirm('Kas kustutada see arve?'))return;state.invoices=state.invoices.filter(i=>i.id!==id);save();renderInvoices()}

function openInvoiceEditor(id){
  editingInvoiceId=id||null;
  let inv;
  if(id) inv=JSON.parse(JSON.stringify(state.invoices.find(i=>i.id===id)));
  else inv={
    id:uid(),number:state.business.invoicePrefix+state.business.nextNumber,
    clientId:state.clients[0]?.id||'',date:today(),dueDate:addDays(today(),14),
    items:[{desc:'',qty:1,price:0}],taxRate:state.business.defaultTaxRate,
    discount:0,discountType:'amount',notes:state.business.notes,
    status:'draft',recurring:false,recurringInterval:'monthly'
  };
  document.getElementById('invoiceModalTitle').textContent=id?'Muuda arvet':'Uus arve';
  window._editingInv=inv;
  renderInvoiceForm();
  document.getElementById('invoiceModal').classList.remove('hidden');
}
function closeInvoiceEditor(){document.getElementById('invoiceModal').classList.add('hidden')}

function renderInvoiceForm(){
  const inv=window._editingInv;const t=totals(inv);
  document.getElementById('invoiceEditorBody').innerHTML=`
    <div class="grid-2">
      <div class="field"><label class="field-label">Arve nr</label><input id="f-number" class="input" value="${esc(inv.number)}"></div>
      <div class="field"><label class="field-label">Klient</label>
        <div style="display:flex;gap:8px">
          <select id="f-client" class="input" style="flex:1">
            <option value="">— Vali klient —</option>
            ${state.clients.map(c=>`<option value="${c.id}" ${c.id===inv.clientId?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select>
          <button onclick="openClientModal()" class="btn btn-secondary">+ Uus</button>
        </div>
      </div>
      <div class="field"><label class="field-label">Kuupäev</label><input type="date" id="f-date" class="input" value="${esc(inv.date)}"></div>
      <div class="field"><label class="field-label">Maksetähtaeg</label><input type="date" id="f-due" class="input" value="${esc(inv.dueDate)}"></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:8px">
      <strong style="font-size:13px;color:#334155">Read</strong>
      <button onclick="addItem()" class="link">+ Lisa rida</button>
    </div>
    <div class="items"><table>
      <thead><tr>
        <th>Kirjeldus</th>
        <th class="right" style="width:80px">Kogus</th>
        <th class="right" style="width:110px">Hind</th>
        <th class="right" style="width:110px">Kokku</th>
        <th style="width:30px"></th>
      </tr></thead>
      <tbody id="f-items">${inv.items.map((it,i)=>itemRow(it,i)).join('')}</tbody>
    </table></div>

    <div class="totals">
      <div>
        <div class="field"><label class="field-label">Märkused / Tingimused</label>
          <textarea id="f-notes" class="input" rows="4">${esc(inv.notes||'')}</textarea></div>
        <div class="rec-box">
          <label><input type="checkbox" id="f-recurring" ${inv.recurring?'checked':''}> <span>Korduv arve</span></label>
          <div class="rec-row"><span style="color:#475569;font-size:13px">Korda</span>
            <select id="f-recurring-interval" class="input" style="width:auto">
              ${Object.entries(INTERVAL_LABEL).map(([v,l])=>`<option value="${v}" ${inv.recurringInterval===v?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
      <div class="totals-list">
        <div class="t-row"><span class="lbl">Vahesumma</span><span id="t-subtotal" style="font-weight:500">${fmt(t.subtotal)}</span></div>
        <div class="t-row"><span class="lbl">Allahindlus</span>
          <div style="display:flex;gap:4px;align-items:center">
            <input id="f-discount" type="number" step="0.01" value="${inv.discount||0}">
            <select id="f-discount-type">
              <option value="amount" ${inv.discountType==='amount'?'selected':''}>${state.business.currencySymbol}</option>
              <option value="percent" ${inv.discountType==='percent'?'selected':''}>%</option>
            </select>
          </div>
        </div>
        <div class="t-row"><span class="lbl">Käibemaks (%)</span><input id="f-tax" type="number" step="0.01" value="${inv.taxRate||0}"></div>
        <div class="t-row t-total"><span>Kokku</span><span id="t-total">${fmt(t.total)}</span></div>
      </div>
    </div>

    <div class="editor-foot">
      <div><label class="field-label" style="display:inline-block;margin-right:6px">Olek</label>
        <select id="f-status" class="input" style="width:auto;display:inline-block">
          ${STATUS_OPTIONS.map(([v,l])=>`<option value="${v}" ${inv.status===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="right">
        <button onclick="closeInvoiceEditor()" class="btn btn-secondary">Tühista</button>
        <button onclick="saveInvoice(false)" class="btn btn-secondary">Salvesta</button>
        <button onclick="saveInvoice(true)" class="btn btn-primary">Salvesta &amp; lae PDF</button>
      </div>
    </div>`;
  ['f-discount','f-discount-type','f-tax'].forEach(id=>document.getElementById(id).addEventListener('input',recalc));
  document.querySelectorAll('#f-items input').forEach(el=>el.addEventListener('input',recalc));
}
function itemRow(it,i){
  const lt=(Number(it.qty)||0)*(Number(it.price)||0);
  return `<tr data-idx="${i}">
    <td><input data-field="desc" data-idx="${i}" value="${esc(it.desc)}" placeholder="Toote või teenuse kirjeldus"></td>
    <td class="item-num"><input type="number" step="0.01" data-field="qty" data-idx="${i}" value="${it.qty||0}" style="text-align:right"></td>
    <td class="item-num"><input type="number" step="0.01" data-field="price" data-idx="${i}" value="${it.price||0}" style="text-align:right"></td>
    <td class="line-total">${fmt(lt)}</td>
    <td><button onclick="removeItem(${i})" class="rm">×</button></td>
  </tr>`;
}
function addItem(){syncForm();window._editingInv.items.push({desc:'',qty:1,price:0});renderInvoiceForm()}
function removeItem(i){syncForm();window._editingInv.items.splice(i,1);if(window._editingInv.items.length===0)window._editingInv.items.push({desc:'',qty:1,price:0});renderInvoiceForm()}
function syncForm(){
  const inv=window._editingInv;
  document.querySelectorAll('#f-items input').forEach(el=>{
    const i=Number(el.dataset.idx),f=el.dataset.field;
    inv.items[i][f]=f==='desc'?el.value:Number(el.value);
  });
  inv.number=document.getElementById('f-number').value;
  inv.clientId=document.getElementById('f-client').value;
  inv.date=document.getElementById('f-date').value;
  inv.dueDate=document.getElementById('f-due').value;
  inv.notes=document.getElementById('f-notes').value;
  inv.taxRate=Number(document.getElementById('f-tax').value);
  inv.discount=Number(document.getElementById('f-discount').value);
  inv.discountType=document.getElementById('f-discount-type').value;
  inv.status=document.getElementById('f-status').value;
  inv.recurring=document.getElementById('f-recurring').checked;
  inv.recurringInterval=document.getElementById('f-recurring-interval').value;
}
function recalc(){
  syncForm();const inv=window._editingInv;
  document.querySelectorAll('#f-items tr').forEach(tr=>{
    const i=Number(tr.dataset.idx);
    tr.children[3].textContent=fmt((Number(inv.items[i].qty)||0)*(Number(inv.items[i].price)||0));
  });
  const t=totals(inv);
  document.getElementById('t-subtotal').textContent=fmt(t.subtotal);
  document.getElementById('t-total').textContent=fmt(t.total);
}
function saveInvoice(thenPDF){
  syncForm();const inv=window._editingInv;
  if(!inv.clientId){toast('Vali esmalt klient');return;}
  const idx=state.invoices.findIndex(i=>i.id===inv.id);
  if(idx>=0)state.invoices[idx]=inv;
  else{state.invoices.push(inv);state.business.nextNumber=(state.business.nextNumber||1001)+1;}
  if(inv.status==='paid'&&!inv.paidDate)inv.paidDate=today();
  save();closeInvoiceEditor();toast('Arve salvestatud');
  if(thenPDF)setTimeout(()=>printInvoice(inv.id),200);
  switchView('invoices');
}

function renderClients(){
  document.getElementById('view-clients').innerHTML=`
    <div class="page-head">
      <div><h1 class="page-title">Kliendid</h1><div class="page-sub">${state.clients.length} salvestatud</div></div>
      <button onclick="openClientModal()" class="btn btn-primary">+ Uus klient</button>
    </div>
    <div class="card">${state.clients.length===0?`<div class="empty"><div class="empty-ico">👥</div><div class="empty-title">Pole veel kliente</div><div class="empty-sub">Salvesta kliendid, et neid arvetel taaskasutada.</div><button onclick="openClientModal()" class="btn btn-primary">+ Lisa klient</button></div>`:`
      <table class="tbl"><thead><tr><th>Nimi</th><th>E-post</th><th>Aadress</th><th class="right">Tegevused</th></tr></thead>
      <tbody>${state.clients.map(c=>`<tr>
        <td><strong>${esc(c.name)}</strong></td>
        <td style="color:#475569">${esc(c.email||'')}</td>
        <td style="color:#475569">${esc((c.address||'').replace(/\n/g,', '))}</td>
        <td class="actions">
          <button onclick="openClientModal('${c.id}')" class="link">Muuda</button>
          <button onclick="deleteClient('${c.id}')" class="btn-danger-link">Kustuta</button>
        </td></tr>`).join('')}</tbody></table>`}
    </div>`;
}
function openClientModal(id){
  editingClientId=id||null;
  const c=id?state.clients.find(x=>x.id===id):{id:uid(),name:'',email:'',phone:'',address:'',regNumber:'',vatNumber:''};
  document.getElementById('clientModalTitle').textContent=id?'Muuda klienti':'Uus klient';
  document.getElementById('clientModalBody').innerHTML=`
    <div class="field"><label class="field-label">Nimi</label><input id="c-name" class="input" value="${esc(c.name)}"></div>
    <div class="field"><label class="field-label">E-post</label><input id="c-email" class="input" value="${esc(c.email)}"></div>
    <div class="field"><label class="field-label">Telefon</label><input id="c-phone" class="input" value="${esc(c.phone)}"></div>
    <div class="grid-2">
      <div class="field"><label class="field-label">Registrikood</label><input id="c-reg" class="input" value="${esc(c.regNumber||'')}"></div>
      <div class="field"><label class="field-label">KMKR nr</label><input id="c-vat" class="input" value="${esc(c.vatNumber||'')}"></div>
    </div>
    <div class="field"><label class="field-label">Aadress</label><textarea id="c-address" class="input" rows="3">${esc(c.address)}</textarea></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
      <button onclick="closeClientModal()" class="btn btn-secondary">Tühista</button>
      <button onclick="saveClient('${c.id}')" class="btn btn-primary">Salvesta</button>
    </div>`;
  document.getElementById('clientModal').classList.remove('hidden');
}
function closeClientModal(){document.getElementById('clientModal').classList.add('hidden')}
function saveClient(id){
  const name=document.getElementById('c-name').value.trim();
  if(!name){toast('Nimi on kohustuslik');return;}
  const data={id,name,
    email:document.getElementById('c-email').value.trim(),
    phone:document.getElementById('c-phone').value.trim(),
    regNumber:document.getElementById('c-reg').value.trim(),
    vatNumber:document.getElementById('c-vat').value.trim(),
    address:document.getElementById('c-address').value.trim()};
  const idx=state.clients.findIndex(c=>c.id===id);
  if(idx>=0)state.clients[idx]=data;else state.clients.push(data);
  save();closeClientModal();
  if(!document.getElementById('invoiceModal').classList.contains('hidden')&&window._editingInv){
    window._editingInv.clientId=id;renderInvoiceForm();
  }else renderClients();
  toast('Klient salvestatud');
}
function deleteClient(id){if(!confirm('Kas kustutada see klient?'))return;state.clients=state.clients.filter(c=>c.id!==id);save();renderClients()}

function renderSettings(){
  const b=state.business;
  document.getElementById('view-settings').innerHTML=`
    <div class="page-head"><div><h1 class="page-title">Seaded</h1><div class="page-sub">Ettevõtte profiil ja arve vaikeväärtused</div></div></div>
    <div class="card" style="padding:24px;max-width:720px">
      <div class="field">
        <label class="field-label">Logo</label>
        <div class="logo-wrap">
          <div class="logo-box">${b.logo?`<img src="${b.logo}">`:`<span class="ph">Logo puudub</span>`}</div>
          <div>
            <input type="file" id="s-logo" accept="image/*">
            ${b.logo?`<div><button onclick="removeLogo()" class="btn-danger-link" style="margin-top:6px">Eemalda logo</button></div>`:''}
            <div style="font-size:11px;color:#94a3b8;margin-top:6px">PNG või JPG, ruut sobib kõige paremini.</div>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Ettevõtte nimi</label><input id="s-name" class="input" value="${esc(b.name)}"></div>
        <div class="field"><label class="field-label">E-post</label><input id="s-email" class="input" value="${esc(b.email)}"></div>
        <div class="field"><label class="field-label">Telefon</label><input id="s-phone" class="input" value="${esc(b.phone)}"></div>
        <div class="field"><label class="field-label">Valuuta sümbol</label><input id="s-symbol" class="input" value="${esc(b.currencySymbol)}"></div>
        <div class="field"><label class="field-label">Registrikood</label><input id="s-reg" class="input" value="${esc(b.regNumber||'')}"></div>
        <div class="field"><label class="field-label">KMKR nr</label><input id="s-vat" class="input" value="${esc(b.vatNumber||'')}"></div>
        <div class="field"><label class="field-label">Pank</label><input id="s-bank" class="input" value="${esc(b.bank||'')}"></div>
        <div class="field"><label class="field-label">IBAN</label><input id="s-iban" class="input" value="${esc(b.iban||'')}"></div>
      </div>
      <div class="field"><label class="field-label">Aadress</label><textarea id="s-address" class="input" rows="3">${esc(b.address)}</textarea></div>
      <div class="grid-3">
        <div class="field"><label class="field-label">Arve eesliide</label><input id="s-prefix" class="input" value="${esc(b.invoicePrefix)}"></div>
        <div class="field"><label class="field-label">Järgmine number</label><input id="s-next" type="number" class="input" value="${b.nextNumber||1001}"></div>
        <div class="field"><label class="field-label">Vaike käibemaks %</label><input id="s-tax" type="number" step="0.01" class="input" value="${b.defaultTaxRate||0}"></div>
      </div>
      <div class="field"><label class="field-label">Vaikemärkused arvel</label><textarea id="s-notes" class="input" rows="2">${esc(b.notes)}</textarea></div>
      <div style="display:flex;justify-content:space-between;padding-top:14px;border-top:1px solid #e2e8f0;margin-top:8px">
        <button onclick="resetAll()" class="btn-danger-link" style="font-size:13px">Lähtesta kõik andmed</button>
        <button onclick="saveSettings()" class="btn btn-primary">Salvesta seaded</button>
      </div>
    </div>`;
  document.getElementById('s-logo').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{state.business.logo=ev.target.result;save();renderSettings();toast('Logo salvestatud')};
    r.readAsDataURL(f);
  });
}
function removeLogo(){state.business.logo='';save();renderSettings()}
function saveSettings(){
  Object.assign(state.business,{
    name:document.getElementById('s-name').value,
    email:document.getElementById('s-email').value,
    phone:document.getElementById('s-phone').value,
    address:document.getElementById('s-address').value,
    currencySymbol:document.getElementById('s-symbol').value||'€',
    regNumber:document.getElementById('s-reg').value,
    vatNumber:document.getElementById('s-vat').value,
    bank:document.getElementById('s-bank').value,
    iban:document.getElementById('s-iban').value,
    invoicePrefix:document.getElementById('s-prefix').value,
    nextNumber:Number(document.getElementById('s-next').value)||1001,
    defaultTaxRate:Number(document.getElementById('s-tax').value)||0,
    notes:document.getElementById('s-notes').value
  });
  save();toast('Seaded salvestatud');
}
function resetAll(){if(!confirm('Kas kustutada kõik andmed?'))return;localStorage.removeItem(DB_KEY);state=load();renderSettings();toast('Lähtestamine valmis')}

function printInvoice(id){
  const inv=state.invoices.find(i=>i.id===id);if(!inv)return;
  const c=state.clients.find(x=>x.id===inv.clientId);
  const b=state.business,t=totals(inv);
  const clientLines=[];
  if(c){
    clientLines.push(c.name);
    if(c.regNumber)clientLines.push('Registrikood: '+c.regNumber);
    if(c.vatNumber)clientLines.push('KMKR nr: '+c.vatNumber);
    if(c.address)clientLines.push(c.address);
    if(c.email)clientLines.push(c.email);
    if(c.phone)clientLines.push(c.phone);
  }
  const bizLines=[b.address,b.email,b.phone].filter(Boolean);
  if(b.regNumber)bizLines.push('Registrikood: '+b.regNumber);
  if(b.vatNumber)bizLines.push('KMKR nr: '+b.vatNumber);
  document.getElementById('print-area').innerHTML=`
    <div class="pa-head">
      <div class="pa-biz">
        ${b.logo?`<img class="pa-logo" src="${b.logo}">`:''}
        <div>
          <div class="pa-biz-name">${esc(b.name)}</div>
          <div class="pa-biz-info">${bizLines.map(esc).join('\n')}</div>
        </div>
      </div>
      <div>
        <div class="pa-title">ARVE</div>
        <div class="pa-number">${esc(inv.number)}</div>
      </div>
    </div>
    <div class="pa-meta">
      <div>
        <div class="pa-label">Maksja</div>
        <div class="pa-client">${clientLines.map(esc).join('\n')}</div>
      </div>
      <div class="pa-dates">
        <div><strong>Kuupäev</strong>${esc(inv.date||'')}</div>
        <div><strong>Maksetähtaeg</strong>${esc(inv.dueDate||'')}</div>
      </div>
    </div>
    <table class="pa-items">
      <thead><tr><th>Kirjeldus</th><th class="r">Kogus</th><th class="r">Hind</th><th class="r">Kokku</th></tr></thead>
      <tbody>${(inv.items||[]).map(it=>`<tr>
        <td>${esc(it.desc)}</td>
        <td class="r">${it.qty||0}</td>
        <td class="r">${fmt(it.price||0)}</td>
        <td class="r">${fmt((Number(it.qty)||0)*(Number(it.price)||0))}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div class="pa-totals">
      <div class="tr"><span>Vahesumma</span><span>${fmt(t.subtotal)}</span></div>
      ${t.discountAmt?`<div class="tr"><span>Allahindlus</span><span>-${fmt(t.discountAmt)}</span></div>`:''}
      ${t.taxAmt?`<div class="tr"><span>Käibemaks (${inv.taxRate}%)</span><span>${fmt(t.taxAmt)}</span></div>`:''}
      <div class="tr tot"><span>TASUDA KOKKU</span><span>${fmt(t.total)}</span></div>
    </div>
    ${(b.bank||b.iban)?`<div style="margin-top:24px;font-size:11px;color:#444">
      ${b.bank?`<div><strong>Pank:</strong> ${esc(b.bank)}</div>`:''}
      ${b.iban?`<div><strong>IBAN:</strong> ${esc(b.iban)}</div>`:''}
      <div><strong>Viitenumber / Selgitus:</strong> ${esc(inv.number)}</div>
    </div>`:''}
    ${inv.notes?`<div class="pa-notes"><div class="pa-notes-label">Märkused</div><div class="pa-notes-text">${esc(inv.notes)}</div></div>`:''}
  `;
  const oldTitle=document.title;
  document.title=inv.number;
  window.print();
  document.title=oldTitle;
}

function processRecurring(){
  const intervals={weekly:7,monthly:30,quarterly:90,yearly:365};
  let changed=false;
  state.invoices.forEach(inv=>{
    if(!inv.recurring)return;
    const n=addDays(inv.date,intervals[inv.recurringInterval]||30);
    if(n<=today()&&!state.invoices.find(i=>i._parent===inv.id&&i.date===n)){
      const copy=JSON.parse(JSON.stringify(inv));
      copy.id=uid();copy.number=state.business.invoicePrefix+state.business.nextNumber++;
      copy.date=n;copy.dueDate=addDays(n,14);copy.status='draft';copy.paidDate=null;
      copy._parent=inv.id;copy.recurring=false;
      state.invoices.push(copy);changed=true;
    }
  });
  if(changed)save();
}

processRecurring();
switchView('dashboard');
</script>
